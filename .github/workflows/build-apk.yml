name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to apk/ folder
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk apk/wiom-csp-onboarding-v3.apk

      - name: Commit updated APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/wiom-csp-onboarding-v3.apk
          if git diff --staged --quiet; then
            echo "APK unchanged, skipping commit"
          else
            git commit -m "Auto-build: update APK from latest source"
            git push
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiom-csp-onboarding-v3
          path: apk/wiom-csp-onboarding-v3.apk
          retention-days: 30
